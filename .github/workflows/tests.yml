name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 11
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
            phpunit: '^11.0'
          # Laravel 12
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
            phpunit: '^12.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'
            phpunit: '^12.0'
          # Laravel 13
          - php: '8.3'
            laravel: '13.*'
            testbench: '^11.0'
            phpunit: '^12.0'
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'
            phpunit: '^12.0'

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: apcu
          ini-values: apc.enable_cli=1
          coverage: none

      - name: Install dependencies
        run: |
          composer require --dev \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-interaction --no-update
          composer update --with "laravel/framework:${{ matrix.laravel }}" \
            --prefer-dist --no-interaction

      - name: Run Pint
        run: vendor/bin/pint --test
        if: matrix.php == '8.4' && matrix.laravel == '12.*'

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=512M
        if: matrix.php == '8.4' && matrix.laravel == '12.*'

      - name: Run PHPUnit
        run: vendor/bin/phpunit
